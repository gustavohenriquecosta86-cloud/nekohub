<section id="login" class="container">
    <div class="login-card">
        <h1 class="logo-text">NekoHub 🐾</h1>
        <button id="loginBtn" class="btn-primary">Entrar com Google</button>
    </div>
</section>

<section id="app" class="app-layout" hidden>
    <header class="topbar">
        <div class="chat-meta">
            <h2>NekoHub 🐾</h2>
            <span class="chat-description">Chat Global</span>
        </div>
        <div class="user-info">
            <img id="userAvatar" src="" class="avatar-min">
            <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main id="chat"></main>

    <footer class="chat-input-area">
        <div class="input-wrapper">
            <input id="msg" type="text" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>
</section>
