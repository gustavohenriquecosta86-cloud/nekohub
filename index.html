<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NekoHub 🐾 — Sua Comunidade em Tempo Real</title>

  <meta name="description" content="NekoHub - Um chat moderno, rápido e escalável para comunidades.">
  <meta name="theme-color" content="#0d0d0d">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <link rel="preconnect" href="https://www.gstatic.com">
</head>
<body>

  <section id="login" class="container" aria-labelledby="loginTitle">
    <div class="login-card">
      <h1 id="loginTitle" class="logo-text">NekoHub 🐾</h1>
      <p>Bem-vindo de volta! Conecte-se para começar.</p>
      
      <button id="loginBtn" type="button" class="btn-primary" aria-label="Entrar usando sua conta do Google">
        <i class="fab fa-google" aria-hidden="true"></i>
        <span>Entrar com Google</span>
      </button>
    </div>
  </section>

  <section id="app" class="app-layout" hidden>
    
    <aside class="sidebar" role="navigation" aria-label="Canais e Grupos">
      <header class="sidebar-header">
        <span class="sidebar-title">Canais</span>
        <button id="addGroupBtn" type="button" title="Criar novo canal de conversa" aria-label="Criar novo grupo">
          <i class="fas fa-plus" aria-hidden="true"></i>
        </button>
      </header>

      <nav id="groupsList" class="groups-nav" aria-label="Lista de canais disponíveis">
        <div class="group-item active" role="button" tabindex="0" aria-current="page">
          <i class="fas fa-hashtag" aria-hidden="true"></i>
          <span>geral</span>
        </div>
      </nav>

      <footer class="sidebar-footer">
        <div class="user-profile" id="userProfile" aria-label="Seu perfil">
          <img id="userAvatar" src="" alt="Sua foto de perfil" class="avatar-min">
          <div class="user-details">
            <span id="userNameShort" class="user-name">Usuário</span>
            <span class="user-status">Online</span>
          </div>
        </div>
      </footer>
    </aside>

    <main class="chat-container">
      
      <header class="topbar">
        <div class="chat-meta">
          <h2 id="currentGroupName"># geral</h2>
          <span class="chat-description">Canal principal da comunidade</span>
        </div>
        
        <div class="topbar-actions">
          <button id="logoutBtn" type="button" class="btn-logout" aria-label="Sair da conta">
            <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
            <span>Sair</span>
          </button>
        </div>
      </header>

      <article id="chat" role="log" aria-live="polite" aria-relevant="additions text">
        </article>

      <footer class="chat-input-area">
        <div class="input-wrapper">
          <input 
            id="msg" 
            type="text" 
            placeholder="Conversar em #geral..." 
            autocomplete="off"
            enterkeyhint="send"
            aria-label="Escrever mensagem para o grupo"
          >
          <button id="sendBtn" type="button" aria-label="Enviar mensagem agora">
            <i class="fas fa-paper-plane" aria-hidden="true"></i>
          </button>
        </div>
      </footer>
    </main>

  </section>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="script.js"></script>

</body>
</html>
