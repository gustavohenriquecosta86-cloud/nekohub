<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NekoHub 🐾 | Global</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="login" class="login-screen">
        <div class="login-card">
            <h1 class="logo-text">🐾 NekoHub</h1>
            <p>Bate-papo 2.0 (Global)</p>
            <button id="loginBtn" class="btn-google">
                <i class="fab fa-google"></i> Entrar com Google
            </button>
        </div>
    </div>

    <div id="app" class="app-layout" hidden>
        <header class="topbar">
            <div class="header-left">
                <i class="fas fa-hashtag"></i>
                <h2>chat-geral (Global)</h2>
            </div>
            <div class="header-right">
                <div class="profile-chip">
                    <img id="userAvatar" src="" class="avatar-min">
                    <span id="userNameShort"></span>
                </div>
                <button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main id="chat"></main>

        <footer class="input-area">
            <div class="input-container">
                <button class="btn-plus"><i class="fas fa-plus-circle"></i></button>
                <input id="msg" type="text" placeholder="Conversar em #chat-geral" autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
